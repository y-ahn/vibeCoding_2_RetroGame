<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 벽돌깨기 (Breakout)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d0d1a;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Courier New',monospace; color:#fff;
  }
  h1 { font-size:1.8rem; letter-spacing:4px; color:#E94560; text-shadow:0 0 20px #E94560; margin-bottom:8px; }
  #hud { display:flex; gap:36px; margin-bottom:12px; font-size:0.95rem; letter-spacing:2px; }
  #hud span { color:#888; } #hud b { color:#FFD700; }
  canvas { background:#000; border:2px solid #E94560; box-shadow:0 0 30px #E9456066; display:block; }
  #overlay {
    position:absolute; background:rgba(0,0,0,0.88);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    border:2px solid #E94560; box-shadow:0 0 30px #E94560aa;
    padding:40px 60px; text-align:center;
  }
  #overlay h2 { font-size:1.8rem; color:#E94560; text-shadow:0 0 10px #E94560; }
  #overlay p { color:#ccc; font-size:0.9rem; }
  button {
    padding:11px 30px; background:transparent; border:2px solid #E94560;
    color:#E94560; font-family:'Courier New',monospace; font-size:0.95rem;
    letter-spacing:2px; cursor:pointer; transition:all .2s;
  }
  button:hover { background:#E94560; color:#000; box-shadow:0 0 20px #E94560; }
  #back-btn {
    margin-top:16px; padding:8px 24px;
    background:transparent; border:1px solid #444;
    color:#666; font-family:'Courier New',monospace; font-size:0.85rem; cursor:pointer; letter-spacing:1px;
  }
  #back-btn:hover { border-color:#E94560; color:#E94560; }
</style>
</head>
<body>
<h1>🧱 BREAKOUT</h1>
<div id="hud">
  <span>SCORE <b id="score">0</b></span>
  <span>LIVES <b id="lives">3</b></span>
  <span>STAGE <b id="stage">1</b></span>
</div>
<div style="position:relative;display:inline-block">
  <canvas id="c" width="480" height="520"></canvas>
  <div id="overlay">
    <h2 id="ov-title">BREAKOUT</h2>
    <p id="ov-sub">마우스 또는 ← → 키로 패들 조종</p>
    <p>모든 벽돌을 부수세요!</p>
    <button onclick="startGame()">▶ 시작하기</button>
  </div>
</div>
<button id="back-btn" onclick="location.href='index.html'">← ゲーム一覧へ</button>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W=480,H=520;

const BROW=6,BCOL=10,BW=42,BH=16,BPADX=4,BPADY=4,BOFFX=9,BOFFY=50;
const BRICK_COLORS=[
  {fill:'#E94560',pts:30,shadow:'#E94560'},
  {fill:'#FF6B35',pts:20,shadow:'#FF6B35'},
  {fill:'#FFD700',pts:10,shadow:'#FFD700'},
  {fill:'#4ECDC4',pts:10,shadow:'#4ECDC4'},
  {fill:'#95E1D3',pts:5,shadow:'#95E1D3'},
  {fill:'#A8DADC',pts:5,shadow:'#A8DADC'},
];

let bricks,paddle,ball,score,lives,stage,running=false,keys={};
let items=[];

const ac = new (window.AudioContext||window.webkitAudioContext)();
function beep(f,d,t='square',v=0.1){
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);
}

function makeBricks(stg){
  bricks=[];
  for(let r=0;r<BROW;r++) for(let c=0;c<BCOL;c++){
    const ci=BRICK_COLORS[r];
    bricks.push({
      x:BOFFX+c*(BW+BPADX), y:BOFFY+r*(BH+BPADY),
      w:BW,h:BH, alive:true,
      color:ci.fill, pts:ci.pts, shadow:ci.shadow,
      hp: stg>=3&&r<2 ? 2 : 1
    });
  }
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0;lives=3;stage=1;items=[];
  makeBricks(stage);
  paddle={x:W/2-45,y:H-28,w:90,h=12,spd:7};
  resetBall();
  running=true;
  updateHUD();
  requestAnimationFrame(loop);
}

function resetBall(){
  ball={x:W/2,y:H-50,vx:(Math.random()>0.5?1:-1)*3.5,vy:-4.5,r:7,stuck:true};
}

function nextStage(){
  stage++;items=[];
  makeBricks(stage);
  resetBall();
  ball.stuck=false;
  const spd=Math.min(4.5+stage*0.4,8);
  ball.vy=-spd; ball.vx=(Math.random()>0.5?1:-1)*spd*0.7;
  updateHUD();
}

function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
  document.getElementById('stage').textContent=stage;
}

function showOverlay(title,sub,btn){
  const ov=document.getElementById('overlay');
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-title').style.color='#E94560';
  document.getElementById('ov-sub').innerHTML=sub;
  ov.querySelector('button').textContent=btn;
  ov.querySelector('button').onclick=startGame;
  ov.style.display='flex';
}

C.addEventListener('mousemove',e=>{
  const r=C.getBoundingClientRect();
  paddle.x=e.clientX-r.left-paddle.w/2;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
});
C.addEventListener('click',()=>{ if(ball.stuck){ball.stuck=false;} });

document.addEventListener('keydown',e=>{keys[e.key]=true; if(e.key===' '){e.preventDefault();ball.stuck=false;}});
document.addEventListener('keyup',e=>keys[e.key]=false);

function loop(){
  if(!running)return;
  // paddle input
  if(keys['ArrowLeft']||keys['a']) paddle.x=Math.max(0,paddle.x-paddle.spd);
  if(keys['ArrowRight']||keys['d']) paddle.x=Math.min(W-paddle.w,paddle.x+paddle.spd);

  if(!ball.stuck){
    ball.x+=ball.vx; ball.y+=ball.vy;
    // walls
    if(ball.x-ball.r<0){ball.x=ball.r;ball.vx*=-1;}
    if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx*=-1;}
    if(ball.y-ball.r<0){ball.y=ball.r;ball.vy*=-1;beep(440,.05);}
    // paddle
    if(ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+paddle.h&&
       ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w&&ball.vy>0){
      const rel=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      ball.vx=rel*spd*1.1; ball.vy=-Math.abs(ball.vy);
      beep(300,.06);
    }
    // lost
    if(ball.y>H+20){
      lives--;updateHUD();beep(100,.4,'sawtooth',.2);
      if(lives<=0){ running=false; showOverlay('GAME OVER',`점수: <b style="color:#FFD700">${score}</b>`,'▶ 다시하기'); return; }
      resetBall();
    }
    // bricks
    for(const b of bricks){
      if(!b.alive)continue;
      if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
        b.hp--;
        if(b.hp<=0){
          b.alive=false;score+=b.pts;updateHUD();beep(660,.06);
          if(Math.random()<0.15) items.push({x:b.x+b.w/2,y:b.y,vy:2,type:Math.random()<0.5?'wide':'slow',alive:true});
        } else { beep(440,.04); }
        const fromLeft=ball.x<b.x||ball.x>b.x+b.w;
        if(fromLeft)ball.vx*=-1; else ball.vy*=-1;
        break;
      }
    }
    if(bricks.every(b=>!b.alive)){nextStage();}
  } else {
    ball.x=paddle.x+paddle.w/2; ball.y=paddle.y-ball.r-1;
  }

  // items
  for(const it of items){
    if(!it.alive)continue;
    it.y+=it.vy;
    if(it.y>H){it.alive=false;continue;}
    if(it.y+10>paddle.y&&it.y<paddle.y+paddle.h&&it.x>paddle.x&&it.x<paddle.x+paddle.w){
      it.alive=false;
      if(it.type==='wide'){paddle.w=Math.min(140,paddle.w+30);setTimeout(()=>paddle.w=90,8000);beep(880,.1);}
      else{ball.vx*=0.7;ball.vy*=0.7;setTimeout(()=>{ball.vx*=1.3;ball.vy*=1.3;},6000);beep(550,.1);}
    }
  }

  draw();
  requestAnimationFrame(loop);
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  // bricks
  for(const b of bricks){
    if(!b.alive)continue;
    ctx.shadowColor=b.shadow;ctx.shadowBlur=b.hp>1?0:8;
    ctx.fillStyle=b.hp>1?'#555':b.color;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    if(b.hp>1){ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.strokeRect(b.x+1,b.y+1,b.w-2,b.h-2);}
    ctx.shadowBlur=0;
  }
  // items
  for(const it of items){
    if(!it.alive)continue;
    ctx.fillStyle=it.type==='wide'?'#4FC3F7':'#FFD700';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=8;
    ctx.fillRect(it.x-10,it.y-5,20,10);ctx.shadowBlur=0;
  }
  // paddle
  ctx.shadowColor='#4FC3F7';ctx.shadowBlur=12;
  ctx.fillStyle='#4FC3F7';
  ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
  ctx.shadowBlur=0;
  // ball
  ctx.shadowColor='#ffffff';ctx.shadowBlur=15;
  ctx.fillStyle='#ffffff';
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}
</script>
</body>
</html>
